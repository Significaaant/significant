<!DOCTYPE html>
<html lang="fr" class="theme-midnight">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G*Power - 𝐬𝐢𝐠𝐧𝐢𝐟𝐢𝐜𝐚𝐧𝐭</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="translations.js"></script>
    <script src="script.js" defer></script>
    <script src="gpower_calc.js" defer></script>
</head>

<body>
    <!-- Theme Selection Visual Feedback -->
    <div class="glass-orb orb-1"></div>
    <div class="glass-orb orb-2"></div>

    <nav class="navbar">
        <div class="logo">𝐬𝐢𝐠𝐧𝐢𝐟𝐢𝐜𝐚𝐧𝐭 <span>Stats</span></div>
        <div class="nav-links">
            <a href="index.html" data-i18n="nav-accueil">Accueil</a>
            <a href="theory.html" target="_blank" data-i18n="nav-fiches">Fiches</a>
            <a href="#" class="active" data-i18n="nav-gpower">G*Power</a>
            <button id="lang-toggle" class="lang-btn">EN</button>
        </div>
    </nav>

    <header class="hero small-hero">
        <div class="container">
            <h1 data-i18n="gpower-title" id="gpower-title-main">Guide <span class="gradient-text">G*Power</span></h1>
            <p data-i18n="gpower-subtitle" id="gpower-hero-subtitle">Planification interactive de la puissance</p>
        </div>
    </header>

    <main class="container">
        <!-- MOBILE NAV CTRLS (Visible only on mobile) -->
        <div class="mindmap-ctrl-mobile">
            <!-- Back Button -->
            <button id="map-back-btn" class="map-nav-btn back-btn-fixed" onclick="mapGoBack()" style="display: none;">
                ← <span data-i18n="nav-retour">Retour</span>
            </button>

            <!-- Reset Button -->
            <button id="map-reset-btn" class="map-nav-btn reset-btn-fixed" onclick="mapReset()">
                ↺ <span data-i18n="quiz-restart-btn">Recommencer</span>
            </button>
        </div>

        <div class="mindmap-viewport" id="mindmap-viewport">
            <!-- Tooltip container -->
            <div id="mindmap-tooltip" class="mindmap-tooltip"></div>

            <div id="mindmap-container" class="mindmap-container">
                <!-- Bubbles rendered here -->
            </div>
            
            <!-- Contextual Detail Card -->
            <div id="detail-card" class="detail-card glass-panel fade-in" style="display: none;">
                <button class="close-btn" onclick="closeDetailCard()">×</button>
                <div id="detail-content"></div>
            </div>
        </div>

    </main>

    <!-- GLOSSARY MODAL -->
    <div id="glossary-modal" class="modal-overlay" style="display: none;" onclick="closeGlossary()">
        <div class="modal-content glass-panel" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeGlossary()">×</button>
            <div id="glossary-content">
                <h3 id="glossary-term">Terme</h3>
                <p id="glossary-def">Définition</p>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container" style="text-align: center;">
            <p data-i18n="footer-text">Made with love • Retour à l'Accueil</p>
        </div>
    </footer>

    <!-- CSS Tweaks for fixed buttons in viewport -->
    <style>
        .map-nav-btn {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 10px 20px;
            border-radius: 30px;
            color: var(--text-color);
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .map-nav-btn:hover { background: var(--primary-color); color: white; transform: translateY(-2px); }
        .back-btn-fixed { top: 25px; left: 25px; }
        .reset-btn-fixed { top: 25px; right: 25px; }
        
        .mindmap-ctrl-mobile { display: none; }
        @media (max-width: 768px) {
            .mindmap-ctrl-mobile {
                display: flex;
                flex-direction: row;
                justify-content: space-between;
                gap: 15px;
                padding: 10px 0;
                width: 100%;
            }
            .map-nav-btn { 
                position: static !important;
                flex: 1; 
                justify-content: center;
                font-size: 0.9rem;
                padding: 12px;
                background: var(--glass-bg);
                border: 1px solid var(--glass-border);
                border-radius: 12px;
                color: var(--text-color);
            }
            .mindmap-viewport { 
                padding: 1rem 0;
                min-height: 450px;
            }
        }
    </style>

    <script src="gpower_data.js"></script>
    <script src="gpower_view.js"></script>
</body>
</html>
